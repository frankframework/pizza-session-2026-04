<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foodfacts</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-container" aria-hidden="true">
      <div class="block" id="block1"></div>
      <div class="block" id="block2"></div>
      <div class="block" id="block3"></div>
      <div class="block" id="block4"></div>
    </div>

    <main id="page" class="page">
      <section id="search-shell" class="search-shell" aria-label="Find products">
        <header class="hero-title">
          <h1>FoodFacts</h1>
          <p>Search by barcode, then explore nutrition details.</p>
        </header>

        <form id="search-form" class="search-form" role="search">
          <label class="sr-only" for="search-input">Search product code</label>
          <input
            id="search-input"
            name="q"
            type="search"
            placeholder="Search product code"
            autocomplete="off"
          />
          <button type="submit">Search</button>
        </form>
      </section>

      <section id="results" class="results" aria-label="Product nutrition cards" aria-live="polite">
        <p id="results-meta" class="results-meta"></p>
        <section id="grid" class="grid"></section>
      </section>
    </main>

    <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-content">
        <button id="modal-close" class="modal-close" aria-label="Close nutrition details">&times;</button>
        <h2 id="modal-title">Nutrition Facts</h2>
        <p id="modal-code" class="modal-code"></p>
        <ul id="modal-list" class="facts-list"></ul>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
